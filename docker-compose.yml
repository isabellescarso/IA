services:

  minio:
    image: minio/minio:latest
    container_name: rag_minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - rag_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - rag_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag_net
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull nomic-embed-text &&
             ollama pull llama3.2 &&
             ollama pull mistral &&
             wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: >
      etcd --advertise-client-urls=http://etcd:2379
           --listen-client-urls=http://0.0.0.0:2379
           --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - rag_net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: rag_milvus
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - rag_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
  attu:
    image: zilliz/attu:latest
    container_name: rag_attu
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8888:3000"
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - rag_net

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: rag_mlflow
    user: "root"
    environment:
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=mlflow-artifacts:/
    command: >
      mlflow server
          --host 0.0.0.0
          --port 5000
          --backend-store-uri sqlite:////mlflow/mlflow.db
          --default-artifact-root mlflow-artifacts:/
          --artifacts-destination /mlflow/artifacts
          --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/artifacts
      - ./mlflow_db:/mlflow
    networks:
      rag_net:
        ipv4_address: 172.28.0.10   # IP fixo — bypass do DNS rebinding check
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/')\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    env_file: .env
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-cgmacros_embeddings}
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      LLM_MODEL_ALT: ${LLM_MODEL_ALT:-mistral}
      MLFLOW_TRACKING_URI: http://172.28.0.10:5000   # IP direto, sem hostname
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "8000:8000"
    depends_on:
      milvus:
        condition: service_healthy
      ollama:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    networks:
      - rag_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_ui
    env_file: .env
    environment:
      API_URL: http://api:8000
    ports:
      - "7860:7860"
    depends_on:
      api:
        condition: service_healthy
    command: python src/ui/gradio_app.py
    networks:
      - rag_net

networks:
  rag_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  minio_data:
  ollama_data:
  etcd_data:
  milvus_data:
  mlflow_data:
  postgres_data: