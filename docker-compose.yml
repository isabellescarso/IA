services:
  minio:
    image: minio/minio:latest
    container_name: rag_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull moondream && ollama pull nomic-embed-text && wait"

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: >
      etcd --advertise-client-urls=http://etcd:2379
           --listen-client-urls=http://0.0.0.0:2379
           --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: rag_milvus
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus

  attu:
    image: zilliz/attu:latest
    container_name: rag_attu
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8888:3000"
    depends_on:
      - milvus

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: rag_mlflow
    user: "root"
    environment:
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=mlflow-artifacts:/
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

volumes:
  minio_data:
  ollama_data:
  etcd_data:
  milvus_data:
  mlflow_data: